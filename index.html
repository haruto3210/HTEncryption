<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HTEncryption</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ===== CSS（あなたの既存CSSはそのまま） ===== -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ============================================================
     HUDログ
============================================================ -->
<div id="hudLog">
  <div id="hudLogBody"></div>
</div>

<!-- ============================================================
     鍵モード選択
============================================================ -->
<div class="section">
  <h2>鍵モード</h2>
  <select id="keyMode">
    <option value="1">1本</option>
    <option value="2">2本</option>
    <option value="3">3本</option>
    <option value="4">4本</option>
  </select>
  <span id="keyStatus" class="warn">鍵未読み込み</span>
</div>

<!-- ============================================================
     鍵読み込み
============================================================ -->
<div class="section">
  <h2>鍵読み込み</h2>

  <div id="keyLoadA">
    <p>鍵A</p>
    <input type="file" id="keyFileA">
  </div>

  <div id="keyLoadB">
    <p>鍵B</p>
    <input type="file" id="keyFileB">
  </div>

  <div id="keyLoadC">
    <p>鍵C</p>
    <input type="file" id="keyFileC">
  </div>

  <div id="keyLoadD">
    <p>鍵D</p>
    <input type="file" id="keyFileD">
  </div>
</div>

<!-- ============================================================
     鍵生成
============================================================ -->
<div class="section">
  <h2>鍵生成</h2>

  <!-- 鍵A -->
  <details id="genA">
    <summary>鍵A</summary>
    <input id="genKeyNameA" placeholder="keyA.bin">
    <input id="genKeySizeA" type="number" value="4096">
    <button onclick="generateKey('A')">鍵A 生成</button>
    <button onclick="generateKeyQR('A')">鍵A QR（ハッシュ）</button>
    <button onclick="generateKeyQR_Multi('A')">鍵A 分割QR生成</button>
  </details>

  <!-- 鍵B -->
  <details id="genB">
    <summary>鍵B</summary>
    <input id="genKeyNameB" placeholder="keyB.bin">
    <input id="genKeySizeB" type="number" value="4096">
    <button onclick="generateKey('B')">鍵B 生成</button>
    <button onclick="generateKeyQR('B')">鍵B QR（ハッシュ）</button>
    <button onclick="generateKeyQR_Multi('B')">鍵B 分割QR生成</button>
  </details>

  <!-- 鍵C -->
  <details id="genC">
    <summary>鍵C</summary>
    <input id="genKeyNameC" placeholder="keyC.bin">
    <input id="genKeySizeC" type="number" value="4096">
    <button onclick="generateKey('C')">鍵C 生成</button>
    <button onclick="generateKeyQR('C')">鍵C QR（ハッシュ）</button>
    <button onclick="generateKeyQR_Multi('C')">鍵C 分割QR生成</button>
  </details>

  <!-- 鍵D -->
  <details id="genD">
    <summary>鍵D</summary>
    <input id="genKeyNameD" placeholder="keyD.bin">
    <input id="genKeySizeD" type="number" value="4096">
    <button onclick="generateKey('D')">鍵D 生成</button>
    <button onclick="generateKeyQR('D')">鍵D QR（ハッシュ）</button>
    <button onclick="generateKeyQR_Multi('D')">鍵D 分割QR生成</button>
  </details>
</div>

<!-- ============================================================
     QR表示モーダル（既存）
============================================================ -->
<div id="qrBackdrop" class="qr-modal-backdrop" style="display:none;">
  <div class="qr-modal">
    <h2 id="qrTitle"></h2>
    <div id="qrContainer"></div>
    <button onclick="closeQRModal()">閉じる</button>
  </div>
</div>

<!-- ============================================================
     QR読み取りモーダル（新規追加）
============================================================ -->
<div id="qrScanBackdrop" class="qr-modal-backdrop" style="display:none;">
  <div class="qr-modal">
    <h2>QR読み取り</h2>

    <video id="qrVideo" autoplay playsinline></video>

    <div class="qr-scan-controls">
      <button onclick="startQRScan()">カメラ開始</button>
      <button onclick="stopQRScan()">停止</button>
      <button onclick="closeQRScanModal()">閉じる</button>
    </div>

    <div id="qrScanStatus"></div>
  </div>
</div>

<!-- ============================================================
     スクリプト読み込み（順番が重要）
============================================================ -->

<!-- QR読み取り用ライブラリ -->
<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<!-- QRコード生成ライブラリ -->
<script src="qrcode.min.js"></script>

<!-- あなたの最新 angou_keys.js -->
<script src="angou_keys.js"></script>

</body>
</html>
