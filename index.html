<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ANGOU HUD SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" type="image/png" href="favicon.png">


<style>
/* ============================
   ガラスHUD 全体デザイン
============================ */
body {
  background: radial-gradient(circle at top, #12263a 0%, #050810 55%, #020308 100%);
  color: #c8f7ff;
  font-family: Consolas, monospace;
  margin: 0;
  padding: 20px;
  overflow-x: hidden;
}

h1 {
  text-align: center;
  color: #9be8ff;
  text-shadow: 0 0 12px #00c8ff;
  margin-bottom: 25px;
  animation: fadeDown 0.6s ease-out;
}

.section {
  margin-bottom: 18px;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.12);
  background: radial-gradient(circle at top left,
    rgba(255,255,255,0.12) 0%,
    rgba(10,16,24,0.85) 40%,
    rgba(5,8,16,0.95) 100%);
  box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  backdrop-filter: blur(14px);
  animation: fadeIn 0.5s ease-out;
}

textarea, input, select {
  width: 100%;
  background: rgba(8,16,24,0.85);
  color: #dffaff;
  border: 1px solid rgba(0,200,255,0.35);
  padding: 9px 10px;
  border-radius: 10px;
  outline: none;
  backdrop-filter: blur(6px);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}

textarea {
  height: 120px;
  resize: vertical;
}

textarea:focus, input:focus, select:focus {
  border-color: #00eaff;
  box-shadow: 0 0 10px rgba(0,234,255,0.6);
  transform: translateY(-1px);
}

button {
  width: 100%;
  background: linear-gradient(135deg, rgba(0,180,255,0.2), rgba(0,255,200,0.18));
  color: #aef3ff;
  border: 1px solid rgba(0, 200, 255, 0.6);
  padding: 11px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.18s;
  backdrop-filter: blur(8px);
}

button:hover {
  background: linear-gradient(135deg, rgba(0,200,255,0.45), rgba(0,255,220,0.35));
  box-shadow: 0 0 14px #00c8ff;
  transform: translateY(-1px);
}

button:active {
  transform: translateY(1px) scale(0.99);
  box-shadow: 0 0 6px #00c8ff;
}
   /* ファイル選択ボタンの文字色を HUD カラーに統一 */
input[type="file"] {
  color: #c8f7ff; /* HUD の文字色 */
}

/* ボタン部分（参照…）も HUD 風に */
input[type="file"]::file-selector-button {
  background: rgba(8,16,24,0.85);
  color: #aef3ff;
  border: 1px solid rgba(0,200,255,0.35);
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: 0.2s;
}

input[type="file"]::file-selector-button:hover {
  background: rgba(0,200,255,0.35);
  box-shadow: 0 0 10px rgba(0,234,255,0.6);
}


.flex-root {
  display: flex;
  gap: 18px;
}

.left-panel { flex: 1.1; }
.center-panel { flex: 1.4; }
.right-panel { flex: 0.9; }

@media (max-width: 1100px) {
  .flex-root { flex-direction: column; }
}

/* ============================
   HUDログ（右下固定）
============================ */
.hud-log-wrapper {
  position: fixed;
  right: 18px;
  bottom: 18px;
  width: 320px;
  max-height: 40vh;
  z-index: 50;
}

.hud-log {
  padding: 10px 12px;
  border-radius: 14px;
  border: 1px solid rgba(0,255,200,0.5);
  background: radial-gradient(circle at top,
    rgba(0,255,200,0.18),
    rgba(2,8,16,0.95));
  box-shadow: 0 0 18px rgba(0,255,200,0.45);
  backdrop-filter: blur(14px);
  font-size: 11px;
  color: #c8f7ff;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 6px;
  animation: slideUp 0.4s ease-out;
}

.hud-log-body {
  max-height: 22vh;
  overflow-y: auto;
}

.hud-log-line {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============================
   QRポップアップ
============================ */
.qr-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.qr-modal {
  background: rgba(0,255,200,0.15);
  border: 1px solid rgba(0,255,200,0.6);
  padding: 20px;
  border-radius: 16px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 20px rgba(0,255,200,0.5);
  animation: fadeIn 0.25s ease-out;
}
   .hud-license-btn {
  position: fixed;
  right: 20px;
  bottom: 80px;
  padding: 6px 12px;
  border: 1px solid rgba(0,255,200,0.5);
  background: rgba(0,255,200,0.15);
  backdrop-filter: blur(10px);
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
  color: #aef3ff;
  z-index: 9999;
}
.hud-license-btn:hover {
  background: rgba(0,255,200,0.3);
}
   #licenseBackdrop {
  z-index: 10000; /* QR より前に出す */
}
.lang-switch {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.lang-toggle {
  padding: 6px 14px;
  border-radius: 10px;
  background: rgba(0,255,200,0.15);
  border: 1px solid rgba(0,255,200,0.4);
  backdrop-filter: blur(10px);
  color: #aef3ff;
  cursor: pointer;
  transition: 0.2s;
}

.lang-toggle:hover {
  background: rgba(0,255,200,0.35);
  box-shadow: 0 0 10px #00eaff;
}

.lang-menu {
  margin-top: 6px;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(0,255,200,0.12);
  border: 1px solid rgba(0,255,200,0.4);
  backdrop-filter: blur(10px);
  display: none;
  flex-direction: column;
  gap: 6px;

  /* ← ここが重要 */
  max-height: 250px;     /* メニューの最大高さ */
  overflow-y: auto;      /* はみ出したらスクロール */
}
body.rtl {
    direction: rtl;
    text-align: right;
}

body.rtl .hud-log {
    direction: rtl;
    text-align: right;
}

body.rtl input,
body.rtl textarea {
    direction: rtl;
    text-align: right;
}

   .lang-menu span {
  color: #aef3ff;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  border: 1px solid rgba(0,255,200,0.3);
  transition: 0.2s;
}

.lang-menu span:hover {
  background: rgba(0,255,200,0.3);
  box-shadow: 0 0 10px #00eaff;
  transform: translateX(-2px);
}

#langMenu input {
  width: 90%;
  padding: 8px;
  margin: 5px auto;
  border-radius: 6px;
  border: 1px solid #666;
  background: #222;
  color: #fff;
  font-size: 14px;
  display: block;
}



/* ============================
   アニメーション
============================ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>
<h1 data-i18n="title">ANGOU HUD SYSTEM</h1>

<div class="lang-switch">
  <div class="lang-toggle" onclick="toggleLangMenu()">LANG</div>

  <div class="lang-menu" id="langMenu"></div>

</div>

<div class="flex-root">

  <!-- 左：鍵管理 -->
  <div class="left-panel">
    <div class="section" style="margin-top:18px;">
  <h3 style="color:#9be8ff; text-shadow:0 0 8px #00c8ff;">
    サイト版をご利用中です
  </h3>

  <p style="font-size:13px; color:#c8f7ff; line-height:1.6; margin-top:10px;">
    このサイト版は軽量で便利ですが、ブラウザ環境に依存するため<br>
    <span style="color:#ffb3b3;">大容量ファイルや高強度暗号化では制限が発生する場合があります。</span><br><br>

    より強化された暗号化エンジンを使用する場合は、<br>
    <span style="color:#aef3ff;">APP版（EXE）</span> をご利用ください。
  </p>

  <button
    onclick="window.open('https://github.com/haruto3210/HTEncryption/releases/download/v1.0.0/HTEncryption_Setup_v1.0.0.exe')"
    style="
      width:100%;
      margin-top:14px;
      background:linear-gradient(135deg, rgba(0,200,255,0.35), rgba(0,255,220,0.25));
      border:1px solid rgba(0,255,200,0.6);
      color:#dff;
      padding:12px;
      border-radius:12px;
      cursor:pointer;
      backdrop-filter:blur(8px);
      transition:0.2s;
      font-size:14px;
    "
  >
    最新の APP版（EXE）をダウンロード
  </button>
</div>

  </div>

  <!-- 中央：暗号化UI -->
  <div class="center-panel">
    <div class="section">
      <label data-i18n="mode">モード：</label>
      <select id="mode">
        <option value="text" data-i18n="mode_text">テキスト</option>
        <option value="file" data-i18n="mode_file">ファイル</option>
      </select>
    </div>

    <div class="section">
      <label data-i18n="passphrase">パスフレーズ：</label>
      <input type="password" id="passphrase">
    </div>

    <div class="section" id="textAreaSection">
      <label data-i18n="plain">平文：</label>
      <textarea id="plain"></textarea>
      <label data-i18n="cipher">暗号文：</label>
      <textarea id="cipher"></textarea>
    </div>

    <div class="section" id="fileAreaSection" style="display:none;">
      <label data-i18n="file_encrypt">暗号化するファイル：</label>
      <input type="file" id="fileInput" multiple>
      <label data-i18n="file_decrypt">復号する .enc ファイル：</label>
      <input type="file" id="encFileInput" multiple>
    </div>

    <div class="section">
      <label><input type="checkbox" id="opMode"> <span data-i18n="op_mode">作戦モード（痕跡ゼロ）</span></label>
    </div>

    <div class="section">
      <button onclick="encryptCtrHmac()" data-i18n="encrypt">暗号化</button>
      <button onclick="decryptCtrHmac()" data-i18n="decrypt">復号</button>
    </div>
  </div>

<div id="licenseBtn" class="hud-license-btn">LICENSE</div>

  <!-- 右：HUDログ -->
  <div class="right-panel"></div>

</div>

<div class="qr-modal-backdrop" id="licenseBackdrop">
  <div class="qr-modal">
    <h3 data-i18n="license_title">ライセンス情報</h3>
    <pre id="licenseText" style="white-space:pre-wrap; font-size:12px;"></pre>
    <button onclick="closeLicenseModal()" data-i18n="close">閉じる</button>
  </div>
</div>

<!-- HUDログ -->
<div class="hud-log-wrapper">
  <div class="hud-log">
    <div class="hud-log-header" data-i18n="log_title">暗号ログ</div>
    <div class="hud-log-body" id="hudLogBody"></div>
  </div>
</div>

<!-- QRポップアップ -->
<div class="qr-modal-backdrop" id="qrBackdrop">
  <div class="qr-modal">
    <div class="qr-modal-title" id="qrTitle"></div>
    <div id="qrContainer"></div>
     <button id="qrSaveBtn" onclick="saveQR()">PNG保存</button>
    <button onclick="closeQRModal()" data-i18n="close">閉じる</button>
  </div>
</div>
<!-- 鍵QR表示用モーダルとは別にしてOK -->
<div id="qrScanBackdrop" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <h2>QR読み取り</h2>
    <video id="qrVideo" autoplay playsinline></video>
    <div class="qr-scan-controls">
      <button onclick="startQRScan()">カメラ開始</button>
      <button onclick="stopQRScan()">停止</button>
      <button onclick="closeQRScanModal()">閉じる</button>
    </div>
    <div id="qrScanStatus"></div>
  </div>
</div>

<!-- QRライブラリ（埋め込み版） -->
   <!-- QRライブラリ（外部読み込み） -->
<script src="./qrcode.min.js"></script>

<!-- QRライブラリ（埋め込み版 + モード切替） -->
<script>
// ============================
// LICENSE モーダル
// ============================
document.getElementById("licenseBtn").onclick = () => {
  const backdrop = document.getElementById("licenseBackdrop");
  const text = document.getElementById("licenseText");

  backdrop.style.display = "flex";

  text.textContent =
`QRCode.js
https://github.com/davidshimjs/qrcodejs
Licensed under the MIT License.

Permission is hereby granted, free of charge...`;
};

function closeLicenseModal() {
  document.getElementById("licenseBackdrop").style.display = "none";
}

// ============================
// モード切替（テキスト ⇄ ファイル）
// ============================
document.addEventListener("DOMContentLoaded", () => {
  const modeSelect = document.getElementById("mode");
  const textArea = document.getElementById("textAreaSection");
  const fileArea = document.getElementById("fileAreaSection");

  function updateMode() {
    if (modeSelect.value === "file") {
      textArea.style.display = "none";
      fileArea.style.display = "block";
    } else {
      textArea.style.display = "block";
      fileArea.style.display = "none";
    }
  }

  modeSelect.addEventListener("change", updateMode);
  updateMode();
});

// ============================
// 多言語対応（JSON 読み込み）
// ============================
let currentLang = "ja";
let rtlLangs = {};
let langLabels = {};

// 言語 JSON 読み込み
async function loadLang(lang) {
  const res = await fetch(`./lang/${lang}.json`);
  const data = await res.json();

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (data[key]) el.textContent = data[key];
  });
}

// RTL 言語対応
function applyDirection(lang) {
  if (rtlLangs[lang]) {
    document.documentElement.setAttribute("dir", "rtl");
    document.body.classList.add("rtl");
  } else {
    document.documentElement.setAttribute("dir", "ltr");
    document.body.classList.remove("rtl");
  }
}

// 言語切り替え
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem("lang", lang);
  loadLang(lang);
  applyDirection(lang);
}

// ブラウザ言語検出
function detectBrowserLang() {
  const saved = localStorage.getItem("lang");
  if (saved) return saved;

  const browser = navigator.language;

  if (langLabels[browser]) return browser;
  if (browser.startsWith("zh")) return "zh-CN";

  return "en";
}

// ============================
// 言語メニュー（検索バー付き）
// ============================
async function buildLangMenu() {
  const menu = document.getElementById("langMenu");

  // languages.json 読み込み
  const res = await fetch("./lang/languages.json");
  langLabels = await res.json();

  // メニュー初期化（検索バー追加）
  menu.innerHTML = `
    <input id="langSearch" type="text" placeholder="Search language..." />
  `;

  const searchInput = document.getElementById("langSearch");

  function renderList(filter = "") {
    menu.querySelectorAll("span").forEach(el => el.remove());

    Object.entries(langLabels).forEach(([code, label]) => {
      if (label.toLowerCase().includes(filter.toLowerCase())) {
        const item = document.createElement("span");
        item.textContent = label;
        item.onclick = () => setLang(code);
        menu.appendChild(item);
      }
    });
  }

  renderList("");

  searchInput.addEventListener("input", () => {
    renderList(searchInput.value);
  });
}

function toggleLangMenu() {
  const menu = document.getElementById("langMenu");
  menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
function saveQR() {
  const container = document.getElementById("qrContainer");

  // QRCode.js は <img> または <canvas> を生成する
  const img = container.querySelector("img");
  const canvas = container.querySelector("canvas");

  let dataUrl = null;

  if (img) {
    // <img> の場合はそのまま取得
    dataUrl = img.src;
  } else if (canvas) {
    // <canvas> の場合は PNG に変換
    dataUrl = canvas.toDataURL("image/png");
  } else {
    alert("QRコードが見つかりません。");
    return;
  }

  // ダウンロードリンクを作成
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = "key_qr.png";
  a.click();
}

// ============================
// 初期化
// ============================
document.addEventListener("DOMContentLoaded", async () => {
  // RTL 読み込み
  const rtlRes = await fetch("./lang/rtl.json");
  rtlLangs = await rtlRes.json();

  // 言語メニュー生成
  await buildLangMenu();

  // 言語決定
  currentLang = detectBrowserLang();
  loadLang(currentLang);
  applyDirection(currentLang);
});
</script>

<!-- JSファイル読み込み順（絶対にこの順番） -->
<script src="./angou_keys.js"></script>
<script src="./angou_crypto_core.js"></script>
<script src="./angou_ctr_hmac.js"></script>

</body>
</html>
